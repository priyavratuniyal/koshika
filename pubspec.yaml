name: koshika
description: "Your health data lives in your cell, not the cloud. Offline-first biomarker tracking with on-device AI."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Local database
  objectbox: ^5.2.0
  objectbox_flutter_libs: any

  # File handling
  file_picker: ^8.1.6
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  path: ^1.9.1

  # Typography
  google_fonts: ^6.2.1

  # Charts & visualization
  fl_chart: ^0.70.2

  # On-device LLM inference

  # Utilities
  intl: ^0.20.2
  string_similarity: ^2.0.0
  collection: ^1.19.1
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  package_info_plus: ^8.1.3
  syncfusion_flutter_pdf: ^32.2.9
  fhir_r4: ^0.5.1
  google_mlkit_text_recognition: ^0.13.1
  pdfx: ^2.6.0
  llamadart: ^0.6.8
  flutter_markdown: ^0.7.7

hooks:
  user_defines:
    llamadart:
      llamadart_native_backends:
        platforms:
          android-arm64:
            backends: [cpu]
            cpu_profile: compact
          android-x64:
            backends: [cpu]

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: any
  objectbox_generator: any

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/data/
