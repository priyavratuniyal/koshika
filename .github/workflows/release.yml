name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build APK and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate ObjectBox bindings
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build release APKs
        run: |
          flutter build apk --flavor lite -t lib/main_lite.dart --release --split-per-abi --target-platform android-arm64,android-x64
          flutter build apk --flavor full -t lib/main_full.dart --release --split-per-abi --target-platform android-arm64,android-x64

      - name: Rename APKs with version
        run: |
          cd build/app/outputs/flutter-apk
          for apk in app-*-release.apk; do
            mv "$apk" "koshika-${{ github.ref_name }}-${apk#app-}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: build/app/outputs/flutter-apk/koshika-${{ github.ref_name }}-*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
